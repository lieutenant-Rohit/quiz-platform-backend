<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Quiz Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">🎓 Classroom Quiz Platform</h2>

    <!-- CREATE QUIZ -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">Create Quiz (Admin)</div>
        <div class="card-body">
            <input type="text" id="quizTitle" class="form-control mb-2" placeholder="Quiz Title">
            <button class="btn btn-primary" onclick="createQuiz()">Create Quiz</button>
            <p class="mt-2" id="quizCreatedMsg"></p>
        </div>
    </div>

    <!-- ADD QUESTION -->
    <div class="card mb-4">
        <div class="card-header bg-success text-white">Add Question</div>
        <div class="card-body">
            <input type="number" id="quizIdForQuestion" class="form-control mb-2" placeholder="Quiz ID">
            <input type="text" id="questionText" class="form-control mb-2" placeholder="Question">
            <input type="text" id="optionA" class="form-control mb-2" placeholder="Option A">
            <input type="text" id="optionB" class="form-control mb-2" placeholder="Option B">
            <input type="text" id="optionC" class="form-control mb-2" placeholder="Option C">
            <input type="text" id="optionD" class="form-control mb-2" placeholder="Option D">
            <input type="text" id="correctAnswer" class="form-control mb-2" placeholder="Correct Answer (A/B/C/D)">
            <button class="btn btn-success" onclick="addQuestion()">Add Question</button>
            <p class="mt-2" id="questionMsg"></p>
        </div>
    </div>

    <!-- TAKE QUIZ -->
    <div class="card mb-4">
        <div class="card-header bg-warning">Take Quiz</div>
        <div class="card-body">
            <input type="number" id="quizIdToTake" class="form-control mb-3" placeholder="Enter Quiz ID">
            <button class="btn btn-warning" onclick="loadQuiz()">Load Quiz</button>
            <div id="quizContainer" class="mt-4"></div>
        </div>
    </div>

</div>

<script>

    const BASE_URL = "http://localhost:8080/api";

    /* CREATE QUIZ */
    function createQuiz() {
        const title = document.getElementById("quizTitle").value;

        fetch(`${BASE_URL}/admin/quiz`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title })
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById("quizCreatedMsg").innerHTML =
                    "Quiz Created! ID: " + data.id;
            })
            .catch(err => console.error(err));
    }

    /* ADD QUESTION */
    function addQuestion() {

        const quizId = document.getElementById("quizIdForQuestion").value;

        const question = {
            questionText: document.getElementById("questionText").value,
            optionA: document.getElementById("optionA").value,
            optionB: document.getElementById("optionB").value,
            optionC: document.getElementById("optionC").value,
            optionD: document.getElementById("optionD").value,
            correctAnswer: document.getElementById("correctAnswer").value
        };

        fetch(`${BASE_URL}/admin/quiz/${quizId}/question`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(question)
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById("questionMsg").innerHTML = "Question Added!";
            })
            .catch(err => console.error(err));
    }

    /* LOAD QUIZ */
    function loadQuiz() {

        const quizId = document.getElementById("quizIdToTake").value;

        fetch(`${BASE_URL}/user/quiz/${quizId}`)
            .then(res => res.json())
            .then(quiz => {

                const container = document.getElementById("quizContainer");
                container.innerHTML = "";

                quiz.questions.forEach((q, index) => {

                    container.innerHTML += `
                <div class="mb-3">
                    <p><strong>${index + 1}. ${q.questionText}</strong></p>
                    <input type="radio" name="q${q.id}" value="A"> ${q.optionA}<br>
                    <input type="radio" name="q${q.id}" value="B"> ${q.optionB}<br>
                    <input type="radio" name="q${q.id}" value="C"> ${q.optionC}<br>
                    <input type="radio" name="q${q.id}" value="D"> ${q.optionD}<br>
                </div>
            `;
                });

                container.innerHTML += `
            <button class="btn btn-dark" onclick="submitQuiz(${quiz.id})">
                Submit Quiz
            </button>
            <h4 class="mt-3" id="scoreResult"></h4>
        `;
            });
    }

    /* SUBMIT QUIZ */
    function submitQuiz(quizId) {

        const answers = {};

        document.querySelectorAll("input[type=radio]:checked").forEach(input => {
            const questionId = input.name.replace("q", "");
            answers[questionId] = input.value;
        });

        fetch(`${BASE_URL}/user/quiz/${quizId}/submit`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(answers)
        })
            .then(res => res.json())
            .then(result => {
                document.getElementById("scoreResult").innerHTML =
                    "Your Score: " + result.score;
            });
    }

</script>

</body>
</html>
