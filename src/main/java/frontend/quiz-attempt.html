<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Assessment | Quiz Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col">

<input type="hidden" id="activeAttemptId">
<input type="hidden" id="currentQuestionId">

<header class="bg-white border-b shadow-sm z-50">
    <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
        <div>
            <h1 id="quizTitleDisplay" class="text-xl font-bold text-gray-800">Loading Assessment...</h1>
            <p id="questionNumberDisplay" class="text-sm text-indigo-600 font-semibold mt-1">Question -- of --</p>
        </div>
        <div class="flex items-center space-x-6">
            <div class="text-right bg-gray-50 px-4 py-2 rounded-lg border border-gray-200">
                <p class="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1">Time Remaining</p>
                <p id="timerDisplay" class="text-2xl font-mono font-bold text-red-600">--:--</p>
            </div>
            <button onclick="submitFinalQuiz()" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-600 hover:text-white px-4 py-2 rounded-lg font-semibold transition duration-200">
                End Test
            </button>
        </div>
    </div>
</header>

<main class="flex-1 max-w-4xl mx-auto w-full px-6 py-8 flex flex-col">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex-1 flex flex-col overflow-hidden">

        <div class="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-start">
            <h2 id="questionText" class="text-xl text-gray-800 font-medium leading-relaxed">
                Loading question data...
            </h2>
            <span id="marksDisplay" class="ml-4 bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap">
                Marks: --
            </span>
        </div>

        <div class="p-6 flex-1 bg-white">
            <div id="optionsContainer" class="space-y-4 max-w-2xl">
                <div class="animate-pulse space-y-4">
                    <div class="h-12 bg-gray-100 rounded-lg w-full"></div>
                    <div class="h-12 bg-gray-100 rounded-lg w-full"></div>
                    <div class="h-12 bg-gray-100 rounded-lg w-full"></div>
                    <div class="h-12 bg-gray-100 rounded-lg w-full"></div>
                </div>
            </div>
        </div>

        <div class="p-6 border-t border-gray-100 bg-gray-50 flex justify-end">
            <button id="nextBtn" onclick="saveAndNext()" class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-sm flex items-center">
                Save & Next <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </div>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/quiz-engine.js"></script>
</body>
</html>
