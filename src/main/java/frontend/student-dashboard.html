<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Quiz Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 font-sans antialiased flex h-screen overflow-hidden">

<aside class="w-64 bg-indigo-900 text-white flex flex-col shadow-lg">
    <div class="p-6 border-b border-indigo-800 text-center">
        <div class="w-20 h-20 mx-auto bg-white rounded-full flex items-center justify-center text-indigo-900 text-3xl font-bold mb-3 shadow-inner">
            <i class="bi bi-person"></i>
        </div>
        <h2 class="text-xl font-bold" id="studentNameDisplay">Loading...</h2>
    </div>
    <nav class="flex-1 px-4 py-6 space-y-2">
        <button class="w-full flex items-center px-4 py-3 bg-indigo-800 rounded-lg text-left text-white shadow">
            <i class="bi bi-house-door me-3"></i> Dashboard
        </button>
        <button class="w-full flex items-center px-4 py-3 rounded-lg text-left text-indigo-200 hover:bg-indigo-800 transition">
            <i class="bi bi-journal-check me-3"></i> Past Results
        </button>
    </nav>
    <div class="p-4 border-t border-indigo-800">
        <button onclick="logout()" class="w-full flex items-center px-4 py-2 text-red-300 hover:bg-indigo-800 rounded-lg transition-colors">
            <i class="bi bi-box-arrow-right me-3"></i> Logout
        </button>
    </div>
</aside>

<main class="flex-1 overflow-y-auto p-8">
    <div class="max-w-4xl mx-auto">

        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Welcome Back!</h1>
            <p class="text-gray-500 mt-2">Ready to test your knowledge today?</p>
        </header>

        <div class="bg-white rounded-xl shadow-sm border p-8 mb-8 text-center">
            <div class="w-16 h-16 mx-auto bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-3xl mb-4">
                <i class="bi bi-play-circle-fill"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Join a Quiz Session</h2>
            <p class="text-gray-500 mb-6">Enter the Session ID provided by your instructor to begin.</p>

            <form id="joinSessionForm" class="max-w-md mx-auto flex gap-3">
                <input type="text" id="joinSessionId" required placeholder="e.g., sess_abc123"
                       class="flex-1 border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition shadow">
                    Join Quiz
                </button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <p class="text-gray-500 text-sm">Quizzes Taken</p>
                <p class="text-2xl font-bold text-gray-800">--</p>
            </div>
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <p class="text-gray-500 text-sm">Average Score</p>
                <p class="text-2xl font-bold text-gray-800">--%</p>
            </div>
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <p class="text-gray-500 text-sm">Rank</p>
                <p class="text-2xl font-bold text-gray-800">--</p>
            </div>
        </div>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/student.js"></script>
</body>
</html>
