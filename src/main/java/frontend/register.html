<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Quiz Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex items-center justify-center py-10">

<div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 m-4">
    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-indigo-600 mb-2">Join the Platform</h1>
        <p class="text-gray-500">Create an account to start taking quizzes</p>
    </div>

    <div id="errorMessage" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded" role="alert">
        <p id="errorText" class="text-sm"></p>
    </div>

    <div id="successMessage" class="hidden bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-6 rounded" role="alert">
        <p class="text-sm">Account created successfully! Redirecting to login...</p>
    </div>

    <form id="registerForm" class="space-y-5">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
            <input type="text" id="name" required placeholder="e.g. John Doe"
                   class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
            <input type="email" id="email" required placeholder="name@example.com"
                   class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" id="password" required placeholder="••••••••" minlength="6"
                   class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
        </div>

        <div>
            <label for="role" class="block text-sm font-medium text-gray-700">I am a...</label>
            <select id="role" required class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                <option value="" disabled selected>Select your role</option>
                <option value="student">Student</option>
                <option value="admin">Administrator / Teacher</option>
            </select>
        </div>

        <button type="submit" id="registerBtn"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
            Register Account
        </button>
    </form>

    <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
            Already have an account?
            <a href="index.html" class="font-medium text-indigo-600 hover:text-indigo-500">Sign in here</a>
        </p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/register.js"></script>
</body>
</html>
